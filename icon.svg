<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2e7d32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1b5e20;stop-opacity:1" />
    </linearGradient>
    <!-- 纸飞机渐变 -->
    <linearGradient id="planeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5f5f5;stop-opacity:1" />
    </linearGradient>
    <!-- 阴影 -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- 圆形背景 -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" filter="url(#shadow)"/>
  
  <!-- 高光 -->
  <ellipse cx="180" cy="150" rx="140" ry="90" fill="#ffffff" opacity="0.08"/>
  
  <!-- 纸飞机（经典折纸造型，极简风格） -->
  <g transform="translate(256, 256)">
    <!-- 主翼（大三角形） -->
    <path d="M -120,-30 L 100,0 L -120,30 Z" 
          fill="url(#planeGrad)" 
          stroke="none"/>
    
    <!-- 左尾翼 -->
    <path d="M -60,-30 L -120,-30 L -80,-20 Z" 
          fill="#f0f0f0" 
          stroke="none"
          opacity="0.85"/>
    
    <!-- 右尾翼 -->
    <path d="M -60,30 L -120,30 L -80,20 Z" 
          fill="#f0f0f0" 
          stroke="none"
          opacity="0.85"/>
    
    <!-- 中心线（折痕） -->
    <line x1="-110" y1="0" x2="90" y2="0" 
          stroke="#d0d0d0" 
          stroke-width="1" 
          stroke-dasharray="12,6" 
          opacity="0.3"
          stroke-linecap="round"/>
  </g>
  
  <!-- 底部阴影 -->
  <ellipse cx="256" cy="475" rx="130" ry="18" fill="#000000" opacity="0.08"/>
</svg>
