name: 构建

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install pyinstaller
      - run: pyinstaller --onefile --name Feidi-win --console --clean transfer.py
      - uses: actions/upload-artifact@v4
        with:
          name: Feidi-win
          path: dist/Feidi-win.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install pyinstaller
      - run: pyinstaller --onefile --name Feidi-macos --console --clean transfer.py
      - uses: actions/upload-artifact@v4
        with:
          name: Feidi-macos
          path: dist/Feidi-macos
