name: 构建

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install pyinstaller
      - run: pyinstaller --onefile --name Feidi-win --console --clean transfer.py
      - uses: actions/upload-artifact@v4
        with:
          name: Feidi-win
          path: dist/Feidi-win.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install pyinstaller
      - run: pyinstaller --onefile --name Feidi-macos --console --clean transfer.py
      - uses: actions/upload-artifact@v4
        with:
          name: Feidi-macos
          path: dist/Feidi-macos

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Feidi-win
      - uses: actions/download-artifact@v4
        with:
          name: Feidi-macos
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: 最新构建
          body: |
            自动构建于 ${{ github.sha }}

            | 平台 | 文件 |
            |------|------|
            | Windows | `Feidi-win.exe` |
            | macOS | `Feidi-macos` |
          files: |
            Feidi-win.exe
            Feidi-macos
          prerelease: true
